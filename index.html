<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI_Popin'Party</title>
  <link rel="stylesheet" href="styles.css?v=20260317" />
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <div>
          <div class="brand-title">AI_Popin'Party</div>
          <div class="brand-sub">Poppin' Party 互动式 AI Chat</div>
        </div>
      </div>
      <div class="topbar-pill">Frosted Pink Edition</div>
    </header>

    <main class="layout">
      <section class="panel panel-right">
        <div id="selectView" class="select-view">
          <div class="panel-header compact">
            <h2>角色选择</h2>
            <p>点击任意角色进入聊天界面。</p>
          </div>
          <div id="characterGrid" class="character-grid"></div>
        </div>

        <div id="chatView" class="chat-view hidden">
          <div class="chat-header">
            <div class="chat-header-left">
              <button id="backBtn" class="back-btn">返回角色选择</button>
              <div class="chat-header-info">
                <div class="chat-name" id="chatName"></div>
                <div class="chat-meta" id="chatMeta"></div>
              </div>
            </div>
            <button id="newChatBtn" class="new-chat-btn">新聊天</button>
          </div>

          <div class="chat-profile" id="chatProfile"></div>

          <div id="chatMessages" class="chat-messages custom-scrollbar"></div>

          <div class="chat-input">
            <input id="chatInput" type="text" placeholder="输入内容，按 Enter 发送" />
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="apiModal" class="api-modal hidden">
    <div class="api-modal-backdrop"></div>
    <div class="api-modal-card">
      <div class="panel-header">
        <h2>API 设置</h2>
        <p>填写后即可开始聊天，设置会自动保存。</p>
      </div>

      <div class="form-card">
        <label class="field">
          <span>API Key</span>
          <input type="password" id="apiKey" placeholder="在此输入你的 Key" />
        </label>

        <label class="field">
          <span>API 地址（锁定）</span>
          <input type="text" id="apiEndpoint" readonly />
        </label>

        <label class="field">
          <span>模型</span>
          <input type="text" id="modelName" readonly />
        </label>
      </div>

      <div class="api-modal-actions">
        <button id="saveApiBtn" class="new-chat-btn">保存设置</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260317"></script>
</body>
</html>
